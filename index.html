<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Takaaaa Spin Wheel · Perfect text fitting</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #1a2f3f 0%, #11212e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 12px;
            margin: 0;
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 800px;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 620px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            display: block;
            border-radius: 50%;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.6), 0 0 0 8px #2e4b5c, 0 0 0 12px #f1c40f;
            background: white;
        }

        .spin-button {
            position: absolute;
            width: 23%;
            height: 23%;
            background: #f1c40f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            box-shadow: 0 6px 0 #b38d1c, 0 12px 25px rgba(0,0,0,0.5);
            border: 4px solid white;
            font-weight: 900;
            font-size: clamp(1rem, 5vw, 1.9rem);
            letter-spacing: 1px;
            color: #1f2c38;
            text-transform: uppercase;
            transition: all 0.08s linear;
            user-select: none;
            cursor: pointer;
            font-family: 'Segoe UI', 'Arial Black', sans-serif;
        }

        .spin-button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #b38d1c, 0 8px 20px rgba(0,0,0,0.5);
        }

        .pointer {
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 24px solid transparent;
            border-right: 24px solid transparent;
            border-top: 42px solid #e63946;
            filter: drop-shadow(0 8px 6px rgba(0,0,0,0.4));
            z-index: 25;
            pointer-events: none;
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .popup-card {
            background: linear-gradient(145deg, #f5f1e7, #fde9d0);
            max-width: 440px;
            width: 85%;
            padding: 2rem 1.8rem;
            border-radius: 64px 24px 64px 24px;
            text-align: center;
            box-shadow: 0 35px 60px rgba(0,0,0,0.6), 0 0 0 6px #f1c40f, 0 0 0 12px #2e4b5c;
            border: 2px solid white;
        }

        .popup-card h2 {
            font-size: 2.8rem;
            font-weight: 900;
            margin-bottom: 0.6rem;
            color: #1e3b4a;
            text-shadow: 3px 3px 0 #f1c40f;
        }

        .popup-card p {
            font-size: 2.2rem;
            font-weight: 800;
            background: #2e4b5c;
            color: white;
            padding: 1.2rem 1rem;
            border-radius: 60px;
            margin: 20px 0 25px;
            border: 3px solid #f1c40f;
        }

        .popup-card button {
            background: #e63946;
            color: white;
            font-weight: 800;
            font-size: 1.9rem;
            padding: 14px 40px;
            border: none;
            border-radius: 60px;
            box-shadow: 0 8px 0 #921a27, 0 10px 25px black;
            cursor: pointer;
            transition: 0.06s linear;
            border: 2px solid #ffb3ba;
        }

        .popup-card button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #921a27;
        }

        .zero-highlight {
            background: #c0392b !important;
            color: #ffe48f !important;
            font-size: 2rem !important;
        }

        .hint {
            color: #bcd4de;
            margin-top: 24px;
            font-size: 1.1rem;
            background: #1d3340;
            padding: 10px 28px;
            border-radius: 60px;
            border: 2px solid #f1c40f80;
        }

        @media (max-width: 500px) {
            .popup-card h2 { font-size: 2rem; }
            .popup-card p { font-size: 1.8rem; }
            .pointer {
                border-left-width: 16px;
                border-right-width: 16px;
                border-top-width: 32px;
            }
        }
    </style>
</head>
<body>
<div class="page-wrapper">
    <div class="wheel-container" id="wheelWrapper">
        <canvas id="wheelCanvas" width="800" height="800"></canvas>
        <div class="spin-button" id="spinBtn" tabindex="0">SPIN</div>
        <div class="pointer"></div>
    </div>
    <div class="hint">⚡ 6 second tak slow spin ⚡</div>
</div>

<div class="popup-overlay" id="popupOverlay">
    <div class="popup-card">
        <h2>🎉 RESULT 🎉</h2>
        <p id="popupMessage"></p>
        <button id="closePopup">BALLE BALLE</button>
    </div>
</div>

<script>
    (function() {
        const values = [
            "0 tk", "1 tk", "100 tk", "1000 tk", "20 tk", "50 tk", "2 tk", "10000 tk", "300 tk", "200 tk",
            "400 tk", "500 tk", "600 tk", "700 tk", "800 tk", "900 tk", "1500 tk", "30 tk", "40 tk", "10 tk",
            "15 tk", "5 tk", "25 tk", "35 tk", "45 tk", "47 tk", "55 tk", "65 tk", "90 tk"
        ];

        const segmentCount = values.length;
        const anglePerSegment = (Math.PI * 2) / segmentCount;
        const segmentColor = '#FFFFFF';

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('wheelWrapper');
        const spinBtn = document.getElementById('spinBtn');
        const popupOverlay = document.getElementById('popupOverlay');
        const popupMessage = document.getElementById('popupMessage');
        const closePopup = document.getElementById('closePopup');

        let currentRotation = 0;
        let spinAnimation = null;
        let isSpinning = false;
        const spinDuration = 6000;
        const fullRotations = 14;

        function resizeCanvas() {
            const w = wrapper.clientWidth;
            const h = wrapper.clientHeight;
            canvas.width = w;
            canvas.height = h;
            drawWheel(currentRotation);
        }

        function drawWheel(rotation) {
            const width = canvas.width;
            const height = canvas.height;
            if (width === 0 || height === 0) return;

            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) * 0.42;
            
            // Text boundaries - exactly where text should start and end
            const textStartRadius = radius * 0.75; // Outer line (near rim)
            const textEndRadius = radius * 0.3;     // Inner line (near center)
            const textLaneWidth = textStartRadius - textEndRadius; // Available space for text
            
            ctx.clearRect(0, 0, width, height);

            // Draw segments
            for (let i = 0; i < segmentCount; i++) {
                const startAngle = i * anglePerSegment + rotation;
                const endAngle = startAngle + anglePerSegment;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = segmentColor;
                ctx.fill();

                ctx.strokeStyle = '#AAAAAA';
                ctx.lineWidth = Math.max(1.2, width * 0.004);
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.lineTo(centerX, centerY);
                ctx.stroke();
            }

            // Outer rim
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = '#333333';
            ctx.lineWidth = Math.max(3, width * 0.008);
            ctx.stroke();

            // Text boundary lines (dashed)
            ctx.beginPath();
            ctx.arc(centerX, centerY, textStartRadius, 0, 2 * Math.PI);
            ctx.strokeStyle = '#666666';
            ctx.lineWidth = Math.max(1.5, width * 0.003);
            ctx.setLineDash([5, 3]);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, textEndRadius, 0, 2 * Math.PI);
            ctx.strokeStyle = '#666666';
            ctx.lineWidth = Math.max(1.5, width * 0.003);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw text - PERFECTLY FITTED
            for (let i = 0; i < segmentCount; i++) {
                const startAngle = i * anglePerSegment + rotation;
                
                ctx.save();
                ctx.translate(centerX, centerY);
                
                const midAngle = startAngle + anglePerSegment / 2;
                
                // Position at the OUTER boundary (start of text)
                const startX = Math.cos(midAngle) * textStartRadius;
                const startY = Math.sin(midAngle) * textStartRadius;
                
                ctx.translate(startX, startY);
                ctx.rotate(midAngle);
                
                // Calculate dynamic font size based on text length
                let displayText = values[i];
                if (displayText === "10000 tk") displayText = "10k tk";
                else if (displayText === "1500 tk") displayText = "1.5k tk";
                
                // Count characters to determine font size
                const charCount = displayText.length;
                // Base font size on wheel size and lane width, adjusted for text length
                // For longer text, make font smaller so it fits
                let fontSize = Math.min(
                    textLaneWidth * 0.9, // Max size based on lane width
                    (textLaneWidth / charCount) * 2.2 // Scale by character count
                );
                
                // Cap font size to reasonable limits
                fontSize = Math.min(Math.max(fontSize, width * 0.03), width * 0.07);
                
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                
                ctx.font = `bold ${fontSize}px 'Segoe UI', 'Arial', sans-serif`;
                ctx.fillStyle = '#000000';
                ctx.shadowColor = 'rgba(0,0,0,0.1)';
                ctx.shadowBlur = 2;
                
                // Draw text - it will start at outer boundary and extend inward
                ctx.fillText(displayText, 0, 0);
                
                ctx.restore();
            }

            // Center circle
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.2, 0, 2 * Math.PI);
            ctx.fillStyle = '#f1c40f';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#000000';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // Inner white ring
            ctx.beginPath();
            ctx.arc(centerX, centerY, textEndRadius - 2, 0, 2 * Math.PI);
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function getCurrentSegmentIndex(rotation) {
            const pointerAngle = -Math.PI / 2;
            let rawAngle = (pointerAngle - rotation + 2 * Math.PI) % (2 * Math.PI);
            return Math.floor(rawAngle / anglePerSegment) % segmentCount;
        }

        function startSpin() {
            if (isSpinning) return;

            isSpinning = true;
            spinBtn.style.opacity = '0.8';
            spinBtn.style.pointerEvents = 'none';
            
            const startRotation = currentRotation;
            const startTime = performance.now();
            
            const randomLandingOffset = Math.random() * 2 * Math.PI;
            const targetRotation = startRotation + (fullRotations * 2 * Math.PI) + randomLandingOffset;

            function animateSmooth(currentTime) {
                const elapsed = currentTime - startTime;
                let progress = Math.min(elapsed / spinDuration, 1);
                
                // Exponential ease-out for super smooth stop
                let easeOutProgress;
                if (progress === 0) {
                    easeOutProgress = 0;
                } else {
                    easeOutProgress = 1 - Math.pow(2, -10 * progress);
                }
                
                currentRotation = startRotation + (targetRotation - startRotation) * easeOutProgress;
                currentRotation = currentRotation % (2 * Math.PI);
                
                drawWheel(currentRotation);

                if (progress < 1) {
                    spinAnimation = requestAnimationFrame(animateSmooth);
                } else {
                    currentRotation = targetRotation % (2 * Math.PI);
                    drawWheel(currentRotation);
                    
                    setTimeout(() => {
                        isSpinning = false;
                        spinBtn.style.opacity = '1';
                        spinBtn.style.pointerEvents = 'auto';
                        
                        const winnerIdx = getCurrentSegmentIndex(currentRotation);
                        const winningValue = values[winnerIdx];
                        
                        let message;
                        if (winningValue === "0 tk") {
                            message = "hehe bhuwaaa tmi salami paba naa 😂";
                            popupMessage.className = 'zero-highlight';
                        } else {
                            message = `🎊 ${winningValue} 🎊`;
                            popupMessage.className = '';
                        }
                        popupMessage.innerText = message;
                        popupOverlay.style.display = 'flex';
                        
                        spinAnimation = null;
                    }, 50);
                }
            }

            if (spinAnimation) cancelAnimationFrame(spinAnimation);
            spinAnimation = requestAnimationFrame(animateSmooth);
        }

        closePopup.addEventListener('click', () => {
            popupOverlay.style.display = 'none';
        });
        
        popupOverlay.addEventListener('click', (e) => {
            if (e.target === popupOverlay) popupOverlay.style.display = 'none';
        });

        spinBtn.addEventListener('click', startSpin);

        window.addEventListener('resize', () => {
            resizeCanvas();
        });

        setTimeout(() => {
            resizeCanvas();
            currentRotation = Math.random() * 2 * Math.PI;
            drawWheel(currentRotation);
        }, 10);

        canvas.addEventListener('touchstart', (e) => e.preventDefault());
    })();
</script>
</body>
</html>
